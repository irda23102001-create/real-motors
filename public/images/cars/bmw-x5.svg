<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3B6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E4872;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0c0d8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid lines subtle -->
  <line x1="0" y1="250" x2="800" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Car silhouette -->
  <g transform="translate(150, 140)">
    <!-- Car body -->
    <path d="M80,120 L80,80 Q90,40 140,30 L280,20 Q340,18 380,30 L420,80 L420,120 Z"
          fill="url(#carGrad)" opacity="0.9"/>
    <!-- Car roof -->
    <path d="M140,30 L160,5 Q200,-5 280,0 L340,5 L380,30 Z"
          fill="#c8d8ec" opacity="0.9"/>
    <!-- Windows -->
    <path d="M155,28 L165,8 Q195,2 240,4 L240,28 Z" fill="#1F3B6A" opacity="0.6"/>
    <path d="M248,28 L248,4 Q275,2 330,8 L335,28 Z" fill="#1F3B6A" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="130" cy="122" r="38" fill="#1a1a2e"/>
    <circle cx="130" cy="122" r="25" fill="#2e2e4a"/>
    <circle cx="130" cy="122" r="14" fill="#4a5a7a"/>
    <circle cx="130" cy="122" r="6" fill="#c9a84c"/>
    <circle cx="370" cy="122" r="38" fill="#1a1a2e"/>
    <circle cx="370" cy="122" r="25" fill="#2e2e4a"/>
    <circle cx="370" cy="122" r="14" fill="#4a5a7a"/>
    <circle cx="370" cy="122" r="6" fill="#c9a84c"/>
    <!-- Undercarriage line -->
    <rect x="80" y="118" width="340" height="6" fill="#8a9ab8" rx="3"/>
    <!-- Headlight -->
    <ellipse cx="90" cy="90" rx="12" ry="8" fill="#fff8e0" opacity="0.8"/>
    <!-- Tail light -->
    <rect x="408" y="85" width="14" height="10" rx="2" fill="#ff6b6b" opacity="0.7"/>
    <!-- Door lines -->
    <line x1="220" y1="35" x2="210" y2="118" stroke="#a0b0c8" stroke-width="2" opacity="0.6"/>
    <line x1="310" y1="30" x2="305" y2="118" stroke="#a0b0c8" stroke-width="2" opacity="0.6"/>
    <!-- Road shadow -->
    <ellipse cx="250" cy="165" rx="200" ry="12" fill="rgba(0,0,0,0.3)"/>
  </g>
  <!-- Logo text -->
  <text x="400" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.4)" letter-spacing="8">REAL MOTORS</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" letter-spacing="4">IMAGE COMING SOON</text>
</svg>
